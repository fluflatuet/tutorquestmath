<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TutorQuest - Math Adventures for Kids</title>
    <style>
        :root {
            --bg-color: #FDF5E6;
            --card-bg: #FFFFFF;
            --primary-color: #2196F3;
            --secondary-color: #FFB74D;
            --text-color: #3E2723;
            --muted-text: #757575;
            --accent-color: #9C27B0;
            --border-radius: 20px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.4;
            margin: 0;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            max-width: 480px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        header {
            margin-top: 15px;
            margin-bottom: 25px;
        }

        .app-icon {
            width: 100px;
            height: 100px;
            border-radius: 22px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            margin-bottom: 15px;
            border: 2px solid white;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 900;
            margin: 0 0 5px 0;
            color: var(--primary-color);
            letter-spacing: -0.5px;
        }

        .tagline {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-color);
            margin: 0 0 15px 0;
            padding: 0 10px;
        }

        .pill-badge {
            display: inline-block;
            background: var(--secondary-color);
            color: white;
            padding: 5px 14px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .links-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 10px;
        }

        /* Base Link Button Style */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.05rem;
            padding: 16px 20px;
            border-radius: var(--border-radius);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            box-sizing: border-box;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Primary Action: Google Play Store Button */
        .btn-playstore {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 5px 15px rgba(33, 150, 243, 0.3);
            font-size: 1.15rem;
            padding: 18px 20px;
            border: none;
        }

        /* Secondary Action: Parent Guide Manual Link */
        .btn-manual {
            background-color: var(--card-bg);
            color: var(--primary-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.04);
            border: 2px solid var(--primary-color);
        }

        /* Social Network Base Buttons */
        .btn-social {
            background-color: var(--card-bg);
            color: var(--text-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.04);
            font-size: 0.95rem;
            font-weight: 600;
            padding: 14px 20px;
        }

        /* Social Icon Alignment Layout */
        .btn svg {
            width: 22px;
            height: 22px;
            margin-right: 12px;
            fill: currentColor;
            flex-shrink: 0;
        }

        footer {
            margin-top: auto;
            padding-top: 40px;
            padding-bottom: 10px;
            font-size: 0.8rem;
            color: var(--muted-text);
            font-weight: 500;
        }
    </style>
</head>
